version: 2
updates:
  # JavaScript / TypeScript workspace (pnpm). Grouped to keep PR noise down.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # Group only minor/patch bumps. Majors (e.g. a TypeScript or vitest major)
      # get their own PRs so each breaking upgrade is reviewed on its own.
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
      production-dependencies:
        dependency-type: production
        update-types:
          - minor
          - patch

  # Python SDK.
  - package-ecosystem: pip
    directory: /sdks/python
    schedule:
      interval: weekly
    open-pull-requests-limit: 3

  # GitHub Actions used in the workflows.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
