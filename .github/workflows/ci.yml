name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: typecheck / test / format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # Plain install (not --frozen-lockfile): the committed lockfile may lag.
      - name: Install
        run: pnpm install

      # turbo run typecheck across the workspace.
      - name: Typecheck
        run: pnpm typecheck

      # `test` exists but is a no-op in packages without spec files;
      # --passWithNoTests keeps those green while real suites still run.
      - name: Test
        run: pnpm -r --if-present test -- --passWithNoTests

      # The workspace is prettier-clean; enforce it so drift can't creep back.
      - name: Format check
        run: pnpm format:check

  python:
    name: python sdk
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/python
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.11'

      - name: Install
        run: pip install -e ".[dev]"

      - name: Test
        run: pytest -q

  integration:
    name: db migrate + api smoke
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: companybrain
          POSTGRES_PASSWORD: companybrain
          POSTGRES_DB: companybrain
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U companybrain -d companybrain"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      DATABASE_URL: postgres://companybrain:companybrain@localhost:5432/companybrain

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install

      # Applies the SQL migrations (creates the vector + pgcrypto extensions).
      - name: Run migrations
        run: pnpm --filter @companybrain/db migrate

      # Boot the API and exercise a health + register + add + search round-trip.
      # No API keys: local embeddings, no LLM.
      - name: API smoke test
        env:
          AUTO_MIGRATE: "false"
          # Multi-tenant mode so the token maps to its registered org, which lets
          # the smoke assert cross-org isolation (IDOR) below.
          AUTH_MODE: multi
          EMBEDDING_PROVIDER: local
          LLM_PROVIDER: none
          API_HOST: 127.0.0.1
          API_PORT: "3333"
          JWT_SECRET: ci-smoke-secret-000000000000000000000000000000000000000000000000
        run: |
          set -euo pipefail
          BASE="http://127.0.0.1:3333"

          # Start the API in the background (tsx, no build step required).
          pnpm --filter @companybrain/api exec tsx src/index.ts > /tmp/api.log 2>&1 &
          API_PID=$!
          cleanup() { kill "$API_PID" 2>/dev/null || true; }
          trap cleanup EXIT

          # Wait for /health to report ok (up to ~60s).
          ok=""
          for _ in $(seq 1 60); do
            if curl -fsS "$BASE/health" 2>/dev/null | grep -q '"status":"ok"'; then
              ok=1; break
            fi
            if ! kill -0 "$API_PID" 2>/dev/null; then
              echo "::error::API process exited before becoming healthy"
              cat /tmp/api.log; exit 1
            fi
            sleep 1
          done
          if [ -z "$ok" ]; then
            echo "::error::/health never reported ok"
            cat /tmp/api.log; exit 1
          fi
          echo "health ok"

          # Register an org + owner and capture the session token.
          REG=$(curl -fsS -X POST "$BASE/v1/auth/register" \
            -H 'content-type: application/json' \
            -d '{"email":"ci@example.com","password":"password123","name":"CI","orgName":"CI Org"}')
          TOKEN=$(printf '%s' "$REG" | jq -r '.token')
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "::error::register did not return a token: $REG"; exit 1
          fi
          echo "register ok"

          # Add a memory (literal words guarantee a keyword-arm hit); keep its id
          # for the tenant-isolation check.
          ADD=$(curl -fsS -X POST "$BASE/v1/memories" \
            -H "authorization: Bearer $TOKEN" \
            -H 'content-type: application/json' \
            -d '{"title":"CI smoke","content":"CompanyBrain integration smoke verification zulu quebec"}')
          MID_A=$(printf '%s' "$ADD" | jq -r '.memory.id')
          if [ -z "$MID_A" ] || [ "$MID_A" = "null" ]; then
            echo "::error::add did not return a memory id: $ADD"; exit 1
          fi
          echo "add memory ok"

          # Search and require at least one hit.
          SEARCH=$(curl -fsS -X POST "$BASE/v1/search" \
            -H "authorization: Bearer $TOKEN" \
            -H 'content-type: application/json' \
            -d '{"q":"smoke verification zulu","mode":"hybrid"}')
          echo "search response: $SEARCH"
          COUNT=$(printf '%s' "$SEARCH" | jq '.hits | length')
          if [ "${COUNT:-0}" -lt 1 ]; then
            echo "::error::search returned no hits"
            cat /tmp/api.log; exit 1
          fi
          echo "smoke ok: $COUNT hit(s)"

          # Space isolation: a named space must be created on ingest and scope search.
          curl -fsS -X POST "$BASE/v1/memories" \
            -H "authorization: Bearer $TOKEN" -H 'content-type: application/json' \
            -d '{"title":"Scoped","content":"isolated tango foxtrot in its own space","space":"scoped-space"}' \
            > /dev/null
          SCOPED=$(curl -fsS -X POST "$BASE/v1/search" \
            -H "authorization: Bearer $TOKEN" -H 'content-type: application/json' \
            -d '{"q":"tango foxtrot zulu verification","space":"scoped-space","mode":"hybrid"}')
          SC_COUNT=$(printf '%s' "$SCOPED" | jq '.hits | length')
          # Must find the scoped doc but NOT the earlier default-space "zulu" doc.
          if [ "${SC_COUNT:-0}" -ne 1 ]; then
            echo "::error::space scoping failed, expected exactly 1 hit, got ${SC_COUNT}: $SCOPED"
            cat /tmp/api.log; exit 1
          fi
          echo "space isolation ok: $SC_COUNT hit"

          # Tenant isolation (IDOR): a second org must not read the first org's
          # memory by id. Register org B and fetch org A's memory id with B's token.
          REG_B=$(curl -fsS -X POST "$BASE/v1/auth/register" \
            -H 'content-type: application/json' \
            -d '{"email":"ci-b@example.com","password":"password123","name":"CI B","orgName":"CI Org B"}')
          TOKEN_B=$(printf '%s' "$REG_B" | jq -r '.token')
          if [ -z "$TOKEN_B" ] || [ "$TOKEN_B" = "null" ]; then
            echo "::error::second register did not return a token: $REG_B"; exit 1
          fi
          IDOR_CODE=$(curl -s -o /tmp/idor.json -w '%{http_code}' \
            -H "authorization: Bearer $TOKEN_B" "$BASE/v1/memories/$MID_A")
          if [ "$IDOR_CODE" = "200" ]; then
            echo "::error::IDOR: org B read org A's memory (status $IDOR_CODE): $(cat /tmp/idor.json)"
            cat /tmp/api.log; exit 1
          fi
          echo "tenant isolation ok: cross-org read blocked ($IDOR_CODE)"
