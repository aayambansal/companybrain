name: Docker

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  api-image:
    name: build api image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build only (no push) to catch Dockerfile breakage.
      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
          tags: companybrain/api:ci

  web-image:
    name: build web image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The web Dockerfile may not exist yet; skip cleanly if absent.
      - name: Check for web Dockerfile
        id: check
        run: |
          if [ -f apps/web/Dockerfile ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "apps/web/Dockerfile not present yet; skipping web image build."
          fi

      - name: Set up Docker Buildx
        if: steps.check.outputs.exists == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build web image
        if: steps.check.outputs.exists == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: false
          tags: companybrain/web:ci
