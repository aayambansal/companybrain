name: Stale

on:
  schedule:
    # Mondays 03:00 UTC.
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-stale: 60
          days-before-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          stale-issue-message: >-
            This issue has been inactive for 60 days and is now marked stale.
            Comment to keep it open, otherwise it will be closed in 14 days.
          stale-pr-message: >-
            This pull request has been inactive for 60 days and is now marked stale.
            Push or comment to keep it open, otherwise it will be closed in 14 days.
          exempt-issue-labels: pinned,security
          exempt-pr-labels: pinned,security
