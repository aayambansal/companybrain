<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CompanyBrain</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="wrap">
      <header class="head">
        <div class="brand">
          <span class="prompt">&gt;</span>
          <span class="name">companybrain</span>
        </div>
        <div class="status" id="status" title="Connection status">
          <span class="dot" id="statusDot"></span>
          <span class="status-text" id="statusText">checking…</span>
        </div>
      </header>

      <section class="field">
        <label for="space">space</label>
        <select id="space" disabled>
          <option value="">default</option>
        </select>
      </section>

      <section class="field">
        <label for="tags">tags</label>
        <input id="tags" type="text" autocomplete="off" spellcheck="false" placeholder="comma,separated" />
      </section>

      <section class="actions">
        <button id="savePage" class="btn btn-primary">Save this page</button>
        <button id="saveSelection" class="btn btn-ghost">Save selection</button>
      </section>

      <section class="result" id="result" hidden></section>

      <footer class="foot">
        <a href="#" id="openOptions">options</a>
        <span class="sep">·</span>
        <span id="apiHost" class="host">—</span>
      </footer>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
