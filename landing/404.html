    <style>
      :root {
        --paper: oklch(0.986 0.005 264);
        --surface: #ffffff;
        --ink: oklch(0.205 0.024 266);
        --ink-2: oklch(0.37 0.021 266);

        --iris: oklch(0.54 0.21 264);

        --ease: cubic-bezier(0.16, 1, 0.3, 1);
      }
      * { box-sizing: border-box; margin: 0; }
      body {
        min-height: 100vh; background: var(--paper); color: var(--ink);
        font-family: var(--sans); -webkit-font-smoothing: antialiased;
        display: grid; place-items: center; padding: 32px; position: relative; overflow: hidden;
      }
      canvas { position: absolute; inset: 0; z-index: 0; opacity: 0.8; }

      .brand { display: inline-flex; align-items: center; gap: 11px; font-family: var(--display); font-weight: 600; font-size: 19px; letter-spacing: -0.02em; color: var(--ink); margin-bottom: 40px; }
      .brand svg { width: 30px; height: 30px; }
      .code { font-family: var(--mono); font-size: 13px; letter-spacing: 0.14em; color: var(--iris-strong); text-transform: uppercase; }
      h1 { font-family: var(--display); font-weight: 600; letter-spacing: -0.03em; font-size: clamp(2.2rem, 6vw, 3.4rem); line-height: 1.04; margin: 14px 0 0; text-wrap: balance; }
      p { color: var(--ink-2); font-size: 1.1rem; margin: 16px auto 0; max-width: 42ch; line-height: 1.5; text-wrap: pretty; }
      .actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 30px; }
      .btn { display: inline-flex; align-items: center; gap: 8px; font-family: var(--sans); font-weight: 600; font-size: 15px; border-radius: 11px; padding: 11px 18px; border: 1px solid transparent; transition: transform 0.16s var(--ease), box-shadow 0.22s var(--ease), border-color 0.2s, color 0.2s; }
      .btn-iris { background: var(--iris); color: #fff; box-shadow: 0 8px 22px oklch(0.54 0.21 264 / 0.32); }
      .btn-iris:hover { background: var(--iris-strong); transform: translateY(-1px); }
      .btn-ghost { background: var(--surface); color: var(--ink); border-color: var(--line-2); }
      .btn-ghost:hover { border-color: oklch(0.54 0.21 264 / 0.4); color: var(--iris-strong); }
      a { text-decoration: none; }
      :focus-visible { outline: 2px solid var(--iris); outline-offset: 3px; border-radius: 8px; }
      @media (prefers-reduced-motion: reduce) { canvas { display: none; } }

    <script>
      var reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if (!reduce) (function () {
        var canvas = document.getElementById('c');
        var ctx = canvas.getContext('2d');
        var w, h, dpr, nodes, raf;
        function resize() {
          dpr = Math.min(window.devicePixelRatio || 1, 2);
          w = window.innerWidth; h = window.innerHeight;
          canvas.width = w * dpr; canvas.height = h * dpr;
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
          var count = Math.max(20, Math.min(46, Math.floor((w * h) / 34000)));
          nodes = Array.from({ length: count }, function () {
            return { x: Math.random() * w, y: Math.random() * h, vx: (Math.random() - 0.5) * 0.18, vy: (Math.random() - 0.5) * 0.18, r: 1.3 + Math.random() * 1.6 };
          });
        }
        function step() {
          ctx.clearRect(0, 0, w, h);
          var R = 150;
          for (var i = 0; i < nodes.length; i++) {
            var n = nodes[i]; n.x += n.vx; n.y += n.vy;
            if (n.x < 0 || n.x > w) n.vx *= -1;
            if (n.y < 0 || n.y > h) n.vy *= -1;
          }
          for (var a = 0; a < nodes.length; a++) {
            for (var b = a + 1; b < nodes.length; b++) {
              var d = Math.hypot(nodes[a].x - nodes[b].x, nodes[a].y - nodes[b].y);
              if (d < R) { ctx.strokeStyle = 'oklch(0.54 0.21 264 / ' + (1 - d / R) * 0.15 + ')'; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(nodes[a].x, nodes[a].y); ctx.lineTo(nodes[b].x, nodes[b].y); ctx.stroke(); }
            }
          }
          for (var c = 0; c < nodes.length; c++) { ctx.beginPath(); ctx.arc(nodes[c].x, nodes[c].y, nodes[c].r, 0, Math.PI * 2); ctx.fillStyle = 'oklch(0.54 0.21 264 / 0.45)'; ctx.fill(); }
          raf = requestAnimationFrame(step);
        }
        resize(); step();
        window.addEventListener('resize', function () { cancelAnimationFrame(raf); resize(); step(); });
      })();
